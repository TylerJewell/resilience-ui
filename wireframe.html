                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ── App ──
    function App() {
      const [activeTab, setActiveTab] = useState("clustering");
      const [teams, setTeams] = useState([]);
      const [selectedTeamId, setSelectedTeamId] = useState(null);
      const [nodes, setNodes] = useState(
        Array.from({ length: TOTAL_NODES }, (_, i) => ({ id: i + 1, active: true, status: 'active' }))
      );
      const [teamCounter, setTeamCounter] = useState(0);

      // Tick for runtime counters
      const [, setTick] = useState(0);
      useEffect(() => { const t = setInterval(() => setTick(c => c + 1), 1000); return () => clearInterval(t); }, []);

      // Refs and state for SVG border shape
      const mainAreaRef = useRef(null);
      const leftColRef = useRef(null);
      const cardRefs = useRef({});
      const [borderShape, setBorderShape] = useState(null);
      const [leftColHeight, setLeftColHeight] = useState(null);

      useEffect(() => {
        if (!leftColRef.current) return;
        const observer = new ResizeObserver(() => {
          setLeftColHeight(leftColRef.current.offsetHeight);
        });
        observer.observe(leftColRef.current);
        return () => observer.disconnect();
      }, [teams.length]);

      useEffect(() => {
        function computeShape() {
          if (!selectedTeamId || !mainAreaRef.current || !leftColRef.current || !cardRefs.current[selectedTeamId]) {
            setBorderShape(null);
            return;
          }
          const mainRect = mainAreaRef.current.getBoundingClientRect();
          const leftRect = leftColRef.current.getBoundingClientRect();
          const cardRect = cardRefs.current[selectedTeamId].getBoundingClientRect();

          const x0 = cardRect.left - mainRect.left;
          const x1 = leftRect.width + 16;  // panel left edge (card column + gap)
          const x2 = mainRect.width;
          const y0 = 0;
          const yT = cardRect.top - mainRect.top;
          const yB = cardRect.bottom - mainRect.top;
          const y3 = mainRect.height;
          const r = 12;

          const nearTop = yT < r * 2.5;
          const nearBot = (y3 - yB) < r * 2.5;

          let d;
          if (nearTop && nearBot) {
            // Card spans nearly full height — simple rounded rect
            d = [
              `M ${x0+r},${yT}`, `L ${x2-r},${y0}`,
              `A ${r},${r} 0 0,1 ${x2},${y0+r}`,
              `L ${x2},${y3-r}`, `A ${r},${r} 0 0,1 ${x2-r},${y3}`,
              `L ${x0+r},${yB}`, `A ${r},${r} 0 0,1 ${x0},${yB-r}`,
              `L ${x0},${yT+r}`, `A ${r},${r} 0 0,1 ${x0+r},${yT}`, 'Z'
            ].join(' ');
          } else if (nearTop) {
            // Card at top — notch merges with panel top
            d = [
              `M ${x0+r},${yT}`, `L ${x2-r},${y0}`,
              `A ${r},${r} 0 0,1 ${x2},${y0+r}`,
              `L ${x2},${y3-r}`, `A ${r},${r} 0 0,1 ${x2-r},${y3}`,
              `L ${x1+r},${y3}`, `A ${r},${r} 0 0,1 ${x1},${y3-r}`,
              `L ${x1},${yB+r}`, `A ${r},${r} 0 0,0 ${x1-r},${yB}`,
              `L ${x0+r},${yB}`, `A ${r},${r} 0 0,1 ${x0},${yB-r}`,
              `L ${x0},${yT+r}`, `A ${r},${r} 0 0,1 ${x0+r},${yT}`, 'Z'
            ].join(' ');
          } else if (nearBot) {
            // Card at bottom — notch merges with panel bottom
            d = [
              `M ${x1+r},${y0}`, `L ${x2-r},${y0}`,
              `A ${r},${r} 0 0,1 ${x2},${y0+r}`,
              `L ${x2},${y3-r}`, `A ${r},${r} 0 0,1 ${x2-r},${y3}`,
              `L ${x0+r},${yB}`, `A ${r},${r} 0 0,1 ${x0},${yB-r}`,
              `L ${x0},${yT+r}`, `A ${r},${r} 0 0,1 ${x0+r},${yT}`,
              `L ${x1-r},${yT}`, `A ${r},${r} 0 0,0 ${x1},${yT-r}`,
              `L ${x1},${y0+r}`, `A ${r},${r} 0 0,1 ${x1+r},${y0}`, 'Z'
            ].join(' ');
          } else {
            // General case — card in the middle
            d = [
              `M ${x1+r},${y0}`, `L ${x2-r},${y0}`,
              `A ${r},${r} 0 0,1 ${x2},${y0+r}`,
              `L ${x2},${y3-r}`, `A ${r},${r} 0 0,1 ${x2-r},${y3}`,
              `L ${x1+r},${y3}`, `A ${r},${r} 0 0,1 ${x1},${y3-r}`,
              `L ${x1},${yB+r}`, `A ${r},${r} 0 0,0 ${x1-r},${yB}`,
              `L ${x0+r},${yB}`, `A ${r},${r} 0 0,1 ${x0},${yB-r}`,
              `L ${x0},${yT+r}`, `A ${r},${r} 0 0,1 ${x0+r},${yT}`,
              `L ${x1-r},${yT}`, `A ${r},${r} 0 0,0 ${x1},${yT-r}`,
              `L ${x1},${y0+r}`, `A ${r},${r} 0 0,1 ${x1+r},${y0}`, 'Z'
            ].join(' ');
          }

          setBorderShape({ d, width: mainRect.width, height: mainRect.height });
        }

        // Double-rAF to ensure layout has settled after React render
        requestAnimationFrame(() => requestAnimationFrame(computeShape));
        const observer = new ResizeObserver(() => requestAnimationFrame(computeShape));
        if (mainAreaRef.current) observer.observe(mainAreaRef.current);
        return () => observer.disconnect();
      }, [selectedTeamId, teams.length, activeTab]);

      // Transaction logs keyed by team ID — persisted across team switches
      const [txLogs, setTxLogs] = useState({});

      useEffect(() => {
        if (teams.length === 0) return;
        const interval = setInterval(() => {
          setTxLogs(prev => {
            const next = { ...prev };
            teams.forEach(team => {
              if (team.status !== 'running') return;
              const activeInsts = team.agents.filter(a => a.status === 'active');
              if (activeInsts.length === 0) return;
              const txCount = (prev[team.id] || []).length;
              const isRead = txCount >= 10 ? Math.random() > 0.4 : false;
              const name = DATA_NAMES[Math.floor(Math.random() * DATA_NAMES.length)];
              const now = new Date();
              const ts = now.toLocaleTimeString('en-US', { hour12: false }) + '.' + String(now.getMilliseconds()).padStart(3, '0');
              const latency = isRead ? (Math.floor(Math.random() * 11) + 5) : (Math.floor(Math.random() * 17) + 9);
              const writeNode = Math.floor(Math.random() * 3) + 1;
              const activeNode = activeInsts[Math.floor(Math.random() * activeInsts.length)];
              const entry = {
                id: Date.now() + Math.random(),
                action: isRead ? 'READ' : 'WRITE',
                data: name,
                writeNode: isRead ? `Node${writeNode}` : `Node${activeNode.nodeId}`,
                readNode: isRead ? `Node${activeNode.nodeId}` : '',
                timestamp: ts,
                latency: `${latency}ms`,
              };
              next[team.id] = [entry, ...(prev[team.id] || [])];
            });
            return next;
          });
        }, 400);
        return () => clearInterval(interval);
      }, [teams.map(t => t.id + t.agents.map(a => a.status).join('')).join(',')]);

      const getActiveNodes = useCallback(() => nodes.filter(n => n.active).map(n => n.id), [nodes]);

      const launchTeam = useCallback(() => {
        const activeNodeIds = getActiveNodes();
        const teamId = `team-${Date.now()}`;
        const allNodeIds = [1, 2, 3];
        const agents = allNodeIds.map((nid, i) => ({
          id: `inst-${teamId}-${i}`, teamId, nodeId: nid,
          status: activeNodeIds.includes(nid) ? 'active' : 'failed',
          tokens: Math.floor(Math.random() * 500) + 100,
          readLatency: Math.floor(Math.random() * 11) + 5,
          writeLatency: Math.floor(Math.random() * 17) + 9,
        }));
        const avgRead = Math.floor(agents.reduce((s, a) => s + a.readLatency, 0) / agents.length);
        const avgWrite = Math.floor(agents.reduce((s, a) => s + a.writeLatency, 0) / agents.length);
        setTeams(prev => [...prev, { id: teamId, name: generateTeamName(teamCounter), agents, tokens: agents.reduce((s, a) => s + a.tokens, 0), status: 'running', startTime: Date.now(), avgReadLatency: avgRead, avgWriteLatency: avgWrite }]);
        setSelectedTeamId(teamId);
        setTeamCounter(prev => prev + 1);
      }, [teamCounter, getActiveNodes]);

      const toggleNode = useCallback((nodeId) => {
        const node = nodes.find(n => n.id === nodeId);
        if (!node || node.status === 'stopping' || node.status === 'starting') return; // ignore during transition
        const isActivating = !node.active;
        if (!isActivating) {
          // Stopping phase
          setNodes(prev => prev.map(n => n.id === nodeId ? { ...n, status: 'stopping' } : n));
          setTeams(prev => prev.map(team => ({ ...team, agents: team.agents.map(a => a.nodeId === nodeId && a.status === 'active' ? { ...a, status: 'stopping' } : a) })));
          setTimeout(() => {
            setNodes(prev => prev.map(n => n.id === nodeId ? { ...n, active: false, status: 'failed' } : n));
            setTeams(prev => prev.map(team => ({ ...team, agents: team.agents.map(a => a.nodeId === nodeId && a.status === 'stopping' ? { ...a, status: 'failed' } : a) })));
          }, 2000);
        } else {
          // Starting phase
          setNodes(prev => prev.map(n => n.id === nodeId ? { ...n, status: 'starting' } : n));
          setTeams(prev => prev.map(team => ({ ...team, agents: team.agents.map(a => a.nodeId === nodeId && a.status === 'failed' ? { ...a, status: 'starting' } : a) })));
          setTimeout(() => {
            setNodes(prev => prev.map(n => n.id === nodeId ? { ...n, active: true, status: 'active' } : n));
            setTeams(prev => prev.map(team => ({ ...team, agents: team.agents.map(a => a.nodeId === nodeId && a.status === 'starting' ? { ...a, status: 'active' } : a) })));
          }, 9000);
        }
      }, [nodes]);

      // Token accumulation simulation
      useEffect(() => {
        const interval = setInterval(() => {
          setTeams(prev => prev.map(team => {
            if (team.status !== 'running') return team;
            const updatedAgents = team.agents.map(a => {
              if (a.status === 'active') {
                const rChange = Math.floor(Math.random() * 21) - 10;
                const wChange = Math.floor(Math.random() * 21) - 10;
                return { ...a, tokens: a.tokens + Math.floor(Math.random() * 60) + 20,
                  readLatency: Math.max(5, Math.min(15, a.readLatency + rChange)),
                  writeLatency: Math.max(9, Math.min(25, a.writeLatency + wChange)) };
              }
              return a;
            });
            return { ...team, agents: updatedAgents, tokens: updatedAgents.reduce((s, a) => s + a.tokens, 0),
              avgReadLatency: Math.floor(updatedAgents.reduce((s, a) => s + a.readLatency, 0) / updatedAgents.length),
              avgWriteLatency: Math.floor(updatedAgents.reduce((s, a) => s + a.writeLatency, 0) / updatedAgents.length) };
          }));
        }, 2000);
        return () => clearInterval(interval);
      }, []);

      const totalInstances = teams.reduce((s, t) => s + t.agents.length, 0);
      const totalTokens = teams.reduce((s, t) => s + t.tokens, 0);
      const activeNodeCount = nodes.filter(n => n.active).length;
      const avgReadLatency = teams.length > 0 ? Math.floor(teams.reduce((s, t) => s + t.avgReadLatency, 0) / teams.length) : 0;
      const avgWriteLatency = teams.length > 0 ? Math.floor(teams.reduce((s, t) => s + t.avgWriteLatency, 0) / teams.length) : 0;
      const selectedTeam = teams.find(t => t.id === selectedTeamId) || null;

      // ── HA/DR Refs and state ──
      const hadrMainAreaRef = useRef(null);
      const hadrLeftColRef = useRef(null);
      const hadrCardRefs = useRef({});
      const [hadrBorderShape, setHadrBorderShape] = useState(null);
      const [hadrLeftColHeight, setHadrLeftColHeight] = useState(null);

      // ── HA/DR State ──
      const [hadrRegions, setHadrRegions] = useState([
        { id: 0, name: REGION_NAMES[0], available: true, status: 'available' },
        { id: 1, name: REGION_NAMES[1], available: true, status: 'available' },
      ]);
      const [hadrTeams, setHadrTeams] = useState([]);
      const [hadrSelectedTeamId, setHadrSelectedTeamId] = useState(null);
      const [hadrTeamCounter, setHadrTeamCounter] = useState(0);
      const [hadrTxLogs, setHadrTxLogs] = useState({});
      const [hadrReplLatency, setHadrReplLatency] = useState(42);
      const [hadrReplBytesTotal, setHadrReplBytesTotal] = useState(0);

      const hadrLaunchTeam = useCallback(() => {
        const availableRegions = hadrRegions.filter(r => r.available);
        if (availableRegions.length === 0) return;
        const primaryRegion = availableRegions[Math.floor(Math.random() * availableRegions.length)];
        const teamId = `hadr-team-${Date.now()}`;
        const regionData = {};
        hadrRegions.forEach(r => {
          regionData[r.id] = {
            tokens: Math.floor(Math.random() * 500) + 100,
            readLatency: Math.floor(Math.random() * 11) + 5,
            writeLatency: Math.floor(Math.random() * 17) + 9,
          };
        });
        setHadrTeams(prev => [...prev, {
          id: teamId, name: generateHADRTeamName(hadrTeamCounter),
          primaryRegionId: primaryRegion.id, regionData,
          tokens: Object.values(regionData).reduce((s, r) => s + r.tokens, 0),
          status: 'running', startTime: Date.now(),
          avgReadLatency: Math.floor(Object.values(regionData).reduce((s, r) => s + r.readLatency, 0) / 2),
          avgWriteLatency: Math.floor(Object.values(regionData).reduce((s, r) => s + r.writeLatency, 0) / 2),
        }]);
        setHadrSelectedTeamId(teamId);
        setHadrTeamCounter(prev => prev + 1);
      }, [hadrTeamCounter, hadrRegions]);

      const toggleRegion = useCallback((regionId) => {
        const region = hadrRegions.find(r => r.id === regionId);
        if (!region || region.status === 'stopping' || region.status === 'starting') return;
        const isActivating = !region.available;
        if (!isActivating) {
          // Stopping phase
          setHadrRegions(prev => prev.map(r => r.id === regionId ? { ...r, status: 'stopping' } : r));
          setTimeout(() => {
            setHadrRegions(prev => prev.map(r => r.id === regionId ? { ...r, available: false, status: 'unavailable' } : r));
          }, 2000);
        } else {
          // Starting phase
          setHadrRegions(prev => prev.map(r => r.id === regionId ? { ...r, status: 'starting' } : r));
          setTimeout(() => {
            setHadrRegions(prev => prev.map(r => r.id === regionId ? { ...r, available: true, status: 'available' } : r));
          }, 9000);
        }
      }, [hadrRegions]);

      // HA/DR token accumulation + replication metrics
      useEffect(() => {
        if (hadrTeams.length === 0) return;
        const interval = setInterval(() => {
          setHadrTeams(prev => prev.map(team => {
            if (team.status !== 'running') return team;
            const updatedRegionData = { ...team.regionData };
            hadrRegions.forEach(r => {
              if (r.available) {
                const rd = updatedRegionData[r.id];
                const rChange = Math.floor(Math.random() * 21) - 10;
                const wChange = Math.floor(Math.random() * 21) - 10;
                updatedRegionData[r.id] = {
                  tokens: rd.tokens + Math.floor(Math.random() * 60) + 20,
                  readLatency: Math.max(5, Math.min(15, rd.readLatency + rChange)),
                  writeLatency: Math.max(9, Math.min(25, rd.writeLatency + wChange)),
                };
              }
            });
            const vals = Object.values(updatedRegionData);
            return { ...team, regionData: updatedRegionData,
              tokens: vals.reduce((s, r) => s + r.tokens, 0),
              avgReadLatency: Math.floor(vals.reduce((s, r) => s + r.readLatency, 0) / vals.length),
              avgWriteLatency: Math.floor(vals.reduce((s, r) => s + r.writeLatency, 0) / vals.length),
            };
          }));
          // Fluctuate replication metrics
          const bothUp = hadrRegions.filter(r => r.available).length === 2;
          if (bothUp) {
            setHadrReplLatency(prev => Math.max(20, Math.min(80, prev + Math.floor(Math.random() * 21) - 10)));
            const bytes = Math.floor(Math.random() * 500) + 100;
            setHadrReplBytesTotal(prev => prev + bytes);
          }
        }, 2000);
        return () => clearInterval(interval);
      }, [hadrTeams.length, hadrRegions]);

      // HA/DR transaction + replication log
      useEffect(() => {
        if (hadrTeams.length === 0) return;
        const interval = setInterval(() => {
          setHadrTxLogs(prev => {
            const next = { ...prev };
            hadrTeams.forEach(team => {
              if (team.status !== 'running') return;
              const availRegions = hadrRegions.filter(r => r.available);
              if (availRegions.length === 0) return;
              const txCount = (prev[team.id] || []).length;
              const isRead = txCount >= 10 ? Math.random() > 0.4 : false;
              const originRegion = availRegions[Math.floor(Math.random() * availRegions.length)];
              const name = DATA_NAMES[Math.floor(Math.random() * DATA_NAMES.length)];
              const now = new Date();
              const ts = now.toLocaleTimeString('en-US', { hour12: false }) + '.' + String(now.getMilliseconds()).padStart(3, '0');
              const latency = isRead ? (Math.floor(Math.random() * 11) + 5) : (Math.floor(Math.random() * 17) + 9);
              const entries = [];
              entries.push({
                id: Date.now() + Math.random(),
                action: isRead ? 'READ' : 'WRITE',
                data: name, origin: originRegion.name,
                replicatedTo: '', replicated: false,
                timestamp: ts, latency: `${latency}ms`,
              });
              // If write and both regions up, add replication entry
              if (!isRead && availRegions.length === 2) {
                const targetRegion = hadrRegions.find(r => r.id !== originRegion.id && r.available);
                if (targetRegion) {
                  const replLat = Math.floor(Math.random() * 30) + 20;
                  entries.push({
                    id: Date.now() + Math.random() + 0.5,
                    action: 'WRITE', data: name,
                    origin: originRegion.name, replicatedTo: targetRegion.name,
                    replicated: true, timestamp: ts, latency: `${replLat}ms`,
                  });
                }
              }
              next[team.id] = [...entries, ...(prev[team.id] || [])];
            });
            return next;
          });
        }, 400);
        return () => clearInterval(interval);
      }, [hadrTeams.map(t => t.id).join(','), hadrRegions]);

      // HA/DR border shape effects
      useEffect(() => {
        if (!hadrLeftColRef.current) return;
        const observer = new ResizeObserver(() => {
          setHadrLeftColHeight(hadrLeftColRef.current.offsetHeight);
        });
        observer.observe(hadrLeftColRef.current);
        return () => observer.disconnect();
      }, [hadrTeams.length]);

      useEffect(() => {
        function computeShape() {
          if (!hadrSelectedTeamId || !hadrMainAreaRef.current || !hadrLeftColRef.current || !hadrCardRefs.current[hadrSelectedTeamId]) {
            setHadrBorderShape(null);
            return;
          }
          const mainRect = hadrMainAreaRef.current.getBoundingClientRect();
          const leftRect = hadrLeftColRef.current.getBoundingClientRect();
          const cardRect = hadrCardRefs.current[hadrSelectedTeamId].getBoundingClientRect();

          const x0 = cardRect.left - mainRect.left;
          const x1 = leftRect.width + 16;
          const x2 = mainRect.width;
          const y0 = 0;
          const yT = cardRect.top - mainRect.top;
          const yB = cardRect.bottom - mainRect.top;
          const y3 = mainRect.height;
          const r = 12;

          const nearTop = yT < r * 2.5;
          const nearBot = (y3 - yB) < r * 2.5;

          let d;
          if (nearTop && nearBot) {
            d = [
              `M ${x0+r},${yT}`, `L ${x2-r},${y0}`,
              `A ${r},${r} 0 0,1 ${x2},${y0+r}`,
              `L ${x2},${y3-r}`, `A ${r},${r} 0 0,1 ${x2-r},${y3}`,
              `L ${x0+r},${yB}`, `A ${r},${r} 0 0,1 ${x0},${yB-r}`,
              `L ${x0},${yT+r}`, `A ${r},${r} 0 0,1 ${x0+r},${yT}`, 'Z'
            ].join(' ');
          } else if (nearTop) {
            d = [
              `M ${x0+r},${yT}`, `L ${x2-r},${y0}`,
              `A ${r},${r} 0 0,1 ${x2},${y0+r}`,
              `L ${x2},${y3-r}`, `A ${r},${r} 0 0,1 ${x2-r},${y3}`,
              `L ${x1+r},${y3}`, `A ${r},${r} 0 0,1 ${x1},${y3-r}`,
              `L ${x1},${yB+r}`, `A ${r},${r} 0 0,0 ${x1-r},${yB}`,
              `L ${x0+r},${yB}`, `A ${r},${r} 0 0,1 ${x0},${yB-r}`,
              `L ${x0},${yT+r}`, `A ${r},${r} 0 0,1 ${x0+r},${yT}`, 'Z'
            ].join(' ');
          } else if (nearBot) {
            d = [
              `M ${x1+r},${y0}`, `L ${x2-r},${y0}`,
              `A ${r},${r} 0 0,1 ${x2},${y0+r}`,
              `L ${x2},${y3-r}`, `A ${r},${r} 0 0,1 ${x2-r},${y3}`,
              `L ${x0+r},${yB}`, `A ${r},${r} 0 0,1 ${x0},${yB-r}`,
              `L ${x0},${yT+r}`, `A ${r},${r} 0 0,1 ${x0+r},${yT}`,
              `L ${x1-r},${yT}`, `A ${r},${r} 0 0,0 ${x1},${yT-r}`,
              `L ${x1},${y0+r}`, `A ${r},${r} 0 0,1 ${x1+r},${y0}`, 'Z'
            ].join(' ');
          } else {
            d = [
              `M ${x1+r},${y0}`, `L ${x2-r},${y0}`,
              `A ${r},${r} 0 0,1 ${x2},${y0+r}`,
              `L ${x2},${y3-r}`, `A ${r},${r} 0 0,1 ${x2-r},${y3}`,
              `L ${x1+r},${y3}`, `A ${r},${r} 0 0,1 ${x1},${y3-r}`,
              `L ${x1},${yB+r}`, `A ${r},${r} 0 0,0 ${x1-r},${yB}`,
              `L ${x0+r},${yB}`, `A ${r},${r} 0 0,1 ${x0},${yB-r}`,
              `L ${x0},${yT+r}`, `A ${r},${r} 0 0,1 ${x0+r},${yT}`,
              `L ${x1-r},${yT}`, `A ${r},${r} 0 0,0 ${x1},${yT-r}`,
              `L ${x1},${y0+r}`, `A ${r},${r} 0 0,1 ${x1+r},${y0}`, 'Z'
            ].join(' ');
          }

          setHadrBorderShape({ d, width: mainRect.width, height: mainRect.height });
        }

        requestAnimationFrame(() => requestAnimationFrame(computeShape));
        const observer = new ResizeObserver(() => requestAnimationFrame(computeShape));
        if (hadrMainAreaRef.current) observer.observe(hadrMainAreaRef.current);
        return () => observer.disconnect();
      }, [hadrSelectedTeamId, hadrTeams.length, activeTab]);

      const hadrSelectedTeam = hadrTeams.find(t => t.id === hadrSelectedTeamId) || null;
      const hadrTotalTokens = hadrTeams.reduce((s, t) => s + t.tokens, 0);
      const hadrAvgRead = hadrTeams.length > 0 ? Math.floor(hadrTeams.reduce((s, t) => s + t.avgReadLatency, 0) / hadrTeams.length) : 0;
      const hadrAvgWrite = hadrTeams.length > 0 ? Math.floor(hadrTeams.reduce((s, t) => s + t.avgWriteLatency, 0) / hadrTeams.length) : 0;

      return (
        <div style={{ minHeight: "100vh", background: "#1a1a1a", padding: 24 }}>
          <div style={{ maxWidth: 1800, margin: "0 auto" }}>
            <div style={{ marginBottom: 24 }}>
              <h1 className="text-3xl font-bold">Akka Resilience Demo</h1>
              <p className="text-muted" style={{ marginTop: 8 }}>Visualizing distributed agent orchestration with high availability and resilience</p>
            </div>

            <div className="tab-bar">
              <button className={`tab-btn ${activeTab === "clustering" ? "active" : ""}`} onClick={() => setActiveTab("clustering")}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}><ServerIcon size={16} /> Akka Clustering</span>
              </button>
              <button className={`tab-btn ${activeTab === "hadr" ? "active" : ""}`} onClick={() => setActiveTab("hadr")}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}><ActivityIcon size={16} /> Akka HA/DR</span>
              </button>
            </div>

            {activeTab === "clustering" && (<div>
            <div style={{ marginBottom: 24 }}>
              <ClusterSummary totalInstances={totalInstances} totalTokens={totalTokens} activeNodes={activeNodeCount} totalNodes={TOTAL_NODES} totalTeams={teams.length} avgReadLatency={avgReadLatency} avgWriteLatency={avgWriteLatency} />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "3fr 9fr", gap: 24, alignItems: "start" }}>
              <ControlPanel nodes={nodes} onLaunchTeam={launchTeam} onToggleNode={toggleNode} />

              {/* Main area */}
              <div>
                {teams.length === 0 ? (
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                      <UsersIcon size={20} color="var(--muted-fg)" />
                      <h2 className="font-semibold">Agent Teams</h2>
                    </div>
                    <div className="card" style={{ padding: 24, textAlign: "center" }}>
                      <p className="text-sm text-muted">No teams running. Launch a team to get started.</p>
                    </div>
                  </div>
                ) : (
                  <div ref={mainAreaRef} style={{ display: "flex", position: "relative", alignItems: "flex-start" }}>
                    {/* SVG shaped border overlay */}
                    {borderShape && (
                      <svg style={{
                        position: "absolute", top: 0, left: 0,
                        width: borderShape.width, height: borderShape.height,
                        pointerEvents: "none", zIndex: 1,
                        overflow: "visible",
                      }} viewBox={`0 0 ${borderShape.width} ${borderShape.height}`} fill="none">
                        <path d={borderShape.d} fill="rgba(0,216,221,0.06)" stroke="#02a4a7" strokeWidth="2" />
                      </svg>
                    )}

                    {/* Left column: header + team list */}
                    <div ref={leftColRef} style={{ width: 280, flexShrink: 0, position: "relative", zIndex: 2, alignSelf: "flex-start", minHeight: 600 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                        <UsersIcon size={20} color="var(--muted-fg)" />
                        <h2 className="font-semibold">Agent Teams</h2>
                      </div>

                      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                        {teams.map(team => {
                          const isSelected = team.id === selectedTeamId;
                          const activeAgents = team.agents.filter(a => a.status === 'active').length;
                          const runtime = Math.floor((Date.now() - team.startTime) / 1000);
                          return (
                            <div key={team.id}
                              ref={el => { if (el) cardRefs.current[team.id] = el; }}
                              className="animate-fade-in-left"
                              style={{
                                padding: 16, cursor: "pointer",
                                background: isSelected ? "transparent" : "var(--card)",
                                border: isSelected ? "none" : "1px solid var(--border)",
                                borderRadius: isSelected ? 0 : "var(--radius)",
                                transition: "border-color 0.2s, background 0.2s",
                              }}
                              onClick={() => setSelectedTeamId(isSelected ? null : team.id)}
                              onMouseEnter={e => { if (!isSelected) e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,0.4)"; }}
                              onMouseLeave={e => { if (!isSelected) e.currentTarget.style.boxShadow = "none"; }}
                            >
                              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                                  <div>
                                    <h3 className="font-medium" style={{ fontSize: 14 }}>{team.name}</h3>
                                    <p className="text-xs text-muted" style={{ marginTop: 4 }}>
                                      Runtime: {Math.floor(runtime / 60)}m {runtime % 60}s
                                    </p>
                                  </div>
                                  <span className={`badge ${team.status === 'running' ? 'badge-default' : 'badge-secondary'}`}>
                                    {team.status}
                                  </span>
                                </div>
                                <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 6 }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                    <ActivityIcon size={13} color="#72d35b" />
                                    <span className="text-xs">{activeAgents}/{team.agents.length}</span>
                                  </div>
                                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                    <BotIcon size={13} color="#d2a8ff" />
                                    <span className="text-xs">{team.tokens.toLocaleString()}</span>
                                  </div>
                                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                    <ReadIcon size={13} color="#00d8dd" />
                                    <span className="text-xs">{team.avgReadLatency}ms</span>
                                  </div>
                                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                    <WriteIcon size={13} color="#ffce4a" />
                                    <span className="text-xs">{team.avgWriteLatency}ms</span>
                                  </div>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Right column: agent grid — height constrained to left column */}
                    {selectedTeam && (
                      <div style={{
                        flex: 1, minWidth: 0, position: "relative", zIndex: 2,
                        padding: "8px 24px 21px 32px",
                        display: "flex", flexDirection: "column",
                        maxHeight: leftColHeight || "none",
                        overflow: "hidden",
                      }}>
                        <AgentGrid team={selectedTeam} txLog={selectedTeam ? (txLogs[selectedTeam.id] || []) : []} />
                      </div>
                    )}
                  </div>
                )}
              </div>

            </div>
            </div>)}

            {activeTab === "hadr" && (<div>
            <div style={{ marginBottom: 24 }}>
              <HADRSummary totalTeams={hadrTeams.length} totalTokens={hadrTotalTokens} regions={hadrRegions} avgReadLatency={hadrAvgRead} avgWriteLatency={hadrAvgWrite} replicationLatency={hadrReplLatency} replicationBytes={formatBytes(hadrReplBytesTotal)} />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "3fr 9fr", gap: 24, alignItems: "start" }}>
              <HADRControlPanel regions={hadrRegions} onLaunchTeam={hadrLaunchTeam} onToggleRegion={toggleRegion} />

              {/* Main area */}
              <div>
                {hadrTeams.length === 0 ? (
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                      <UsersIcon size={20} color="var(--muted-fg)" />
                      <h2 className="font-semibold">Agent Teams</h2>
                    </div>
                    <div className="card" style={{ padding: 24, textAlign: "center" }}>
                      <p className="text-sm text-muted">No teams running. Launch a team to get started.</p>
                    </div>
                  </div>
                ) : (
                  <div ref={hadrMainAreaRef} style={{ display: "flex", position: "relative", alignItems: "flex-start" }}>
                    {/* SVG shaped border overlay */}
                    {hadrBorderShape && (
                      <svg style={{
                        position: "absolute", top: 0, left: 0,
                        width: hadrBorderShape.width, height: hadrBorderShape.height,
                        pointerEvents: "none", zIndex: 1,
                        overflow: "visible",
                      }} viewBox={`0 0 ${hadrBorderShape.width} ${hadrBorderShape.height}`} fill="none">
                        <path d={hadrBorderShape.d} fill="rgba(0,216,221,0.06)" stroke="#02a4a7" strokeWidth="2" />
                      </svg>
                    )}

                    {/* Left column: header + team list */}
                    <div ref={hadrLeftColRef} style={{ width: 280, flexShrink: 0, position: "relative", zIndex: 2, alignSelf: "flex-start", minHeight: 600 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                        <UsersIcon size={20} color="var(--muted-fg)" />
                        <h2 className="font-semibold">Agent Teams</h2>
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                        {hadrTeams.map(team => {
                          const isSelected = team.id === hadrSelectedTeamId;
                          const runtime = Math.floor((Date.now() - team.startTime) / 1000);
                          return (
                            <div key={team.id}
                              ref={el => { if (el) hadrCardRefs.current[team.id] = el; }}
                              className="animate-fade-in-left"
                              style={{
                                padding: 16, cursor: "pointer",
                                background: isSelected ? "transparent" : "var(--card)",
                                border: isSelected ? "none" : "1px solid var(--border)",
                                borderRadius: isSelected ? 0 : "var(--radius)",
                                transition: "border-color 0.2s, background 0.2s",
                              }}
                              onClick={() => setHadrSelectedTeamId(isSelected ? null : team.id)}
                              onMouseEnter={e => { if (!isSelected) e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,0.4)"; }}
                              onMouseLeave={e => { if (!isSelected) e.currentTarget.style.boxShadow = "none"; }}
                            >
                              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                                  <div>
                                    <h3 className="font-medium" style={{ fontSize: 14 }}>{team.name}</h3>
                                    <p className="text-xs text-muted" style={{ marginTop: 4 }}>Runtime: {Math.floor(runtime / 60)}m {runtime % 60}s</p>
                                  </div>
                                  <span className={`badge ${team.status === 'running' ? 'badge-default' : 'badge-secondary'}`}>{team.status}</span>
                                </div>
                                <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 6 }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                    <GlobeIcon size={13} color="#72d35b" />
                                    <span className="text-xs">2 regions</span>
                                  </div>
                                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                    <BotIcon size={13} color="#d2a8ff" />
                                    <span className="text-xs">{team.tokens.toLocaleString()}</span>
                                  </div>
                                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                    <ReadIcon size={13} color="#00d8dd" />
                                    <span className="text-xs">{team.avgReadLatency}ms</span>
                                  </div>
                                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                    <WriteIcon size={13} color="#ffce4a" />
                                    <span className="text-xs">{team.avgWriteLatency}ms</span>
                                  </div>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Right column: region grid — height constrained to left column */}
                    {hadrSelectedTeam && (
                      <div style={{
                        flex: 1, minWidth: 0, position: "relative", zIndex: 2,
                        padding: "8px 24px 21px 32px",
                        display: "flex", flexDirection: "column",
                        maxHeight: hadrLeftColHeight || "none",
                        overflow: "hidden",
                      }}>
                        <HADRRegionGrid team={hadrSelectedTeam} regions={hadrRegions} txLog={hadrSelectedTeam ? (hadrTxLogs[hadrSelectedTeam.id] || []) : []} replicationLatency={hadrReplLatency} replicationBytes={formatBytes(hadrReplBytesTotal)} />
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
            </div>)}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
